title: "300 Days of Hacking"
description: "A practical hacking knowledge base covering 90+ security topics"
author: proflamyt
url: "https://proflamyt.github.io"
baseurl: "/300days-of-hacking"

# Theme — use Just the Docs (best for knowledge bases)
remote_theme: just-the-docs/just-the-docs

# Navigation
# Hide the auto-generated left sidebar — the homepage indexes all writeups,
# and the top search bar handles navigation to specific topics.
nav_enabled: false

# Search (stays in the top bar even with sidebar disabled)
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: 'k'

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections — this is KEY for your folder structure
collections:
  topics:
    output: true
    permalink: /:collection/:name/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules