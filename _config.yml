title: "300 Days of Hacking"
description: "A practical hacking knowledge base covering 90+ security topics"
author: proflamyt
url: "https://proflamyt.github.io"
baseurl: "/300days-of-hacking"

# Theme — use Just the Docs (best for knowledge bases)
remote_theme: just-the-docs/just-the-docs

# Navigation
nav_sort: case_insensitive
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections — this is KEY for your folder structure
collections:
  topics:
    output: true
    permalink: /:collection/:name/

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules